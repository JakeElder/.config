# Options
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -gq allow-passthrough on
set -g mouse on

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set vi-mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Keybindings
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind r source-file ~/.config/tmux/tmux.conf \; display-message " Config reloaded..."

# Enable/disable pane synchronization with prefix + y/Y
bind y setw synchronize-panes on \; display-message "Pane sync ON"
bind Y setw synchronize-panes off \; display-message "Pane sync OFF"

# Theme config
source-file $HOME/Code/ttyc/generated/tmux.conf
if-shell "[ \"$(tmux show-option -gv @thm_dialect)\" = 'rose-pine' ]" \
    "source-file $HOME/.config/tmux/theme.rose-pine.conf" \
    "source-file $HOME/.config/tmux/theme.catppuccin.conf"

# Run TTYC
bind-key t run-shell "$HOME/Code/ttyc/ttyc || [ \$? -eq 130 ]"

# Initialize TMUX plugin manager
run $HOME/.tmux/plugins/tpm/tpm
