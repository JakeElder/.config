start-at-login = true
accordion-padding = 12

[gaps]
inner.horizontal = 4
inner.vertical = 4

[mode.main.binding]
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# workspaces
alt-0 = 'workspace 0'
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-c = 'workspace C'
alt-s = 'workspace S'
alt-f = 'workspace F'
alt-z = 'workspace Z'
alt-t = 'workspace T'

# move to workspace
alt-shift-0 = 'move-node-to-workspace 0'
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-c = 'move-node-to-workspace C'
alt-shift-s = 'move-node-to-workspace S'
alt-shift-f = 'move-node-to-workspace F'
alt-shift-z = 'move-node-to-workspace Z'
alt-shift-t = 'move-node-to-workspace T'

# focus
cmd-shift-h = 'focus left'
cmd-shift-j = 'focus down'
cmd-shift-k = 'focus up'
cmd-shift-l = 'focus right'

# misc
alt-tab = 'workspace-back-and-forth'
alt-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'move-node-to-workspace F'

[[on-window-detected]]
if.app-id = 'com.apple.Notes'
run = 'move-node-to-workspace N'

[[on-window-detected]]
if.app-id = 'com.adobe.Photoshop'
run = 'move-node-to-workspace P'

[[on-window-detected]]
if.app-id = 'com.tinyapp.TablePlus'
run = 'move-node-to-workspace T'

[[on-window-detected]]
if.app-name-regex-substring = 'Chromium|Creative Cloud'
run = 'layout floating'
