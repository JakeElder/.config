# term
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# vi mode
set -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# sensible defaults
set -g history-limit 100000
set -g focus-events on
set -s escape-time 0
set -g mouse on

# last window
bind b last-window

# vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# alt+h/l direct pane nav
bind -n M-h select-pane -L
bind -n M-l select-pane -R

# choose tree format
bind-key s choose-tree -s \
    -K "#{?#{e|<:#{line},19},#{a:#{e|+:72,#{line}}},}" \
    -F "#{?pane_format,#{?pane_marked,#[reverse],}#{pane_current_command}#{?pane_active,*,}#{?pane_marked,M,}#{?#{&&:#{pane_title},#{!=:#{pane_title},#{host_short}}},: \"#{pane_title}\",},#{?window_format,#{?window_marked_flag,#[reverse],}#{window_name}#{window_flags},#{?session_attached,#[fg=blue]*,}}}"

# pane keybindings
bind \" split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message " Config reloaded ✓"

# colors
run-shell "~/.config/tc/tmux-load.sh"

# theme
source-file ~/.config/tmux/theme.conf
