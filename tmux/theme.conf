# Status Background
set -g status-style "bg=default"

# Status Left
set -g status-left-length 100
set -g status-left " "
set -ga status-left "#{?client_prefix,#[fg=#{@tc_tmux_project_icon_active}] ,#[fg=#{@tc_tmux_project_icon}] }"
set -ga status-left "#[fg=#{@tc_tmux_inactive}]#S "
set -ga status-left "#[fg=#{@tc_tmux_separator}]│"

# Window
set -gF window-status-separator " #[fg=#{@tc_tmux_separator}]│"
set -g window-status-format " #[fg=#{@tc_tmux_inactive}]#I.#W"
set -g window-status-current-format " #[fg=#{@tc_tmux_active}]#I.#W"

# Status Right
set -g status-right-length 100

set -g status-right '#(
  STATUS="#[fg=#{@tc_tmux_inactive}]  #{=/-32/...:#{b:pane_current_path}} ";

  if ! git -C "#{pane_current_path}" rev-parse --is-inside-work-tree &>/dev/null; then
    echo "${STATUS}#[fg=#{@tc_tmux_separator}]│#[fg=#{@tc_tmux_branch}] ⎇  ";
    exit 0;
  fi;

  BRANCH_NAME=$(git -C "#{pane_current_path}" rev-parse --abbrev-ref HEAD 2>/dev/null);
  BRANCH_COLOR="#[fg=#{@tc_tmux_branch}]";

  if [ "$BRANCH_NAME" = "HEAD" ]; then
    BRANCH_COLOR="#[fg=#{@tc_tmux_branch_detached}]";
  fi;

  if [ -d "$(git -C "#{pane_current_path}" rev-parse --git-path rebase-merge 2>/dev/null)" ] || \
     [ -d "$(git -C "#{pane_current_path}" rev-parse --git-path rebase-apply 2>/dev/null)" ]; then
    BRANCH_COLOR="#[fg=#{@tc_tmux_branch_rebase}]";
  fi;

  STATUS="${STATUS}#[fg=#{@tc_tmux_separator}]│${BRANCH_COLOR} ⎇ ";
  BRANCH_NAME=$(git -C "#{pane_current_path}" rev-parse --abbrev-ref HEAD 2>/dev/null);
  STATUS="${STATUS}#[fg=#{@tc_tmux_branch}]${BRANCH_NAME} "
  STATUS_SB=$(git -C "#{pane_current_path}" status -sb --porcelain 2>/dev/null);

  INDICATORS=""

  if echo "$STATUS_SB" | grep -q "ahead"; then
    INDICATORS="${INDICATORS}#[fg=#{@tc_tmux_git_local_ahead}]#{@tc_icon_git_local_ahead} "
  fi;

  if echo "$STATUS_SB" | grep -q "behind"; then
    INDICATORS="${INDICATORS}#[fg=#{@tc_tmux_git_remote_behind}]#{@tc_icon_git_remote_behind} "
  fi;

  if echo "$STATUS_SB" | grep -qE "^[MADRCU?!]"; then
    INDICATORS="${INDICATORS}#[fg=#{@tc_tmux_git_changes}]#{@tc_icon_git_changes} "
  fi;

  echo "${STATUS}${INDICATORS}";
)'

# Pane
set -wg pane-active-border-style "fg=#{@tc_overlay0}"
set -wg pane-border-style "fg=#{@tc_overlay0}"

# Popups
set -g popup-style "bg=default,fg=default"
set -g popup-border-style "fg=#{@tc_yellow}"

# Message
set -g message-style "fg=#{@tc_green}"
set -g message-command-style "fg=#{@tc_green}"

# Mode
set -g mode-style "bg=#{@tc_surface0},bold"
